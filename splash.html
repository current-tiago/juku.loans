<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Juku - Loading...">
    <title>Juku - Loading...</title>
    <link rel="stylesheet" href="css/splash.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Splash Screen -->
    <div class="splash-screen" id="splashScreen">
        <!-- Top Header Bar -->
        <div class="header-bar">
            <span class="header-text">First Thing Shown When Opening Website - LIGHT MODE</span>
        </div>
        
        <!-- Main Content Area -->
        <div class="content-frame">
            <!-- Blue Border -->
            <div class="blue-border">
                <!-- Dark Border -->
                <div class="dark-border">
                    <!-- Cream Background -->
                    <div class="cream-background">
                        <!-- Central Logo -->
                        <div class="logo-container">
                            <div class="orange-circle">
                                <span class="logo-text">Juku</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Website Content (hidden initially) -->
    <div class="main-content" id="mainContent" style="display: none;">
        <!-- This will be replaced with your actual website content -->
        <div class="content-placeholder">
            <p>Loading your website...</p>
        </div>
    </div>

    <script src="js/splash.js"></script>
</body>
</html>
